<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>William's Math Helper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <div class="login-wrap">
    <div class="login-hero">
      <span class="spider-icon">🕷️</span>
      <h1>William's Math Helper</h1>
      <p>Grade 4 Summer Math Drills</p>
    </div>

    <div class="login-tabs">
      <button class="tab-btn active" data-tab="william">William</button>
      <button class="tab-btn" data-tab="admin">Admin</button>
    </div>

    <div class="login-card">
      <!-- William Tab -->
      <div class="tab-content" id="tab-william">
        <h2>Hey William! 🕷️ Ready to practice?</h2>
        <div class="form-group" style="margin-top:1rem">
          <label for="william-pass">Your Password</label>
          <input type="password" id="william-pass" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-full btn-lg" id="william-login">Let's Go!</button>
        <div class="error-msg" id="william-error">Wrong password! Ask your dad to help. 🕷️</div>
      </div>

      <!-- Admin Tab -->
      <div class="tab-content hidden" id="tab-admin">
        <h2>Admin Access</h2>
        <div class="form-group" style="margin-top:1rem">
          <label for="admin-pass">Admin Password</label>
          <input type="password" id="admin-pass" placeholder="Enter admin password" autocomplete="current-password">
        </div>
        <button class="btn btn-secondary btn-full" id="admin-login">Login</button>
        <div class="error-msg" id="admin-error">Incorrect admin password.</div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Redirect if already logged in
    const s = getSession();
    if (s === 'william') location.href = 'dashboard.html';
    if (s === 'admin')   location.href = 'admin.html';

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
      });
    });

    // William login
    function loginWilliam() {
      const input = document.getElementById('william-pass');
      if (input.value === getWilliamPass()) {
        setSession('william');
        location.href = 'dashboard.html';
      } else {
        document.getElementById('william-error').style.display = 'block';
        input.value = '';
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 400);
      }
    }
    document.getElementById('william-login').addEventListener('click', loginWilliam);
    document.getElementById('william-pass').addEventListener('keypress', e => { if (e.key === 'Enter') loginWilliam(); });

    // Admin login
    function loginAdmin() {
      const input = document.getElementById('admin-pass');
      if (input.value === getAdminPass()) {
        setSession('admin');
        location.href = 'admin.html';
      } else {
        document.getElementById('admin-error').style.display = 'block';
        input.value = '';
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 400);
      }
    }
    document.getElementById('admin-login').addEventListener('click', loginAdmin);
    document.getElementById('admin-pass').addEventListener('keypress', e => { if (e.key === 'Enter') loginAdmin(); });

    // Hide errors on input
    document.getElementById('william-pass').addEventListener('input', () => {
      document.getElementById('william-error').style.display = 'none';
    });
    document.getElementById('admin-pass').addEventListener('input', () => {
      document.getElementById('admin-error').style.display = 'none';
    });
  </script>
</body>
</html>
